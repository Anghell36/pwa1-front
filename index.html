<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>El Quesillo | Delivery App</title>
    
    <!-- Meta tags PWA -->
    <meta name="theme-color" content="#f59e0b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    
    <!-- Tailwind CSS (Framework) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome (Iconos) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts: Outfit (Tipografía moderna, redonda y comercial) -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <!-- Configuración Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            yellow: '#FBBF24', // Queso
                            orange: '#F59E0B', // Queso oscuro
                            red: '#EF4444',    // Acentos
                            dark: '#292524',   // Carne/Texto oscuro
                            light: '#F5F5F4'   // Fondo app
                        }
                    },
                    boxShadow: {
                        'soft': '0 10px 40px -10px rgba(0,0,0,0.08)',
                        'glow': '0 0 20px rgba(245, 158, 11, 0.4)',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #F5F5F4;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Ocultar barra de scroll pero permitir deslizamiento */
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }

        /* Animación suave para el carrito flotante */
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="text-brand-dark pb-24 md:pb-0">

    <!-- Top Navigation -->
    <header class="bg-white sticky top-0 z-40 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-brand-yellow rounded-xl flex items-center justify-center text-white text-xl shadow-lg">
                    <i class="fa-solid fa-cheese"></i>
                </div>
                <h1 class="text-2xl font-extrabold tracking-tight">El Quesillo</h1>
            </div>
            
            <button onclick="toggleCart()" class="relative p-2 text-brand-dark hover:text-brand-orange transition hidden md:block">
                <i class="fa-solid fa-cart-shopping text-2xl"></i>
                <span id="cart-badge-desktop" class="absolute top-0 right-0 bg-brand-red text-white text-[10px] font-bold px-2 py-0.5 rounded-full border-2 border-white shadow-sm hidden">0</span>
            </button>
        </div>
    </header>

    <!-- Hero Section Comercial (Destacado) -->
    <section class="max-w-7xl mx-auto px-4 py-6">
        <div class="relative w-full h-48 md:h-80 rounded-3xl overflow-hidden shadow-soft">
            <img src="https://images.unsplash.com/photo-1615819074712-8700ab256564?q=80&w=1200&auto=format&fit=crop" alt="Parrilla de carne" class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-gradient-to-r from-black/80 via-black/50 to-transparent flex flex-col justify-center p-6 md:p-12">
                <span class="bg-brand-red text-white text-xs font-bold px-3 py-1 rounded-full w-max mb-3 uppercase tracking-wide">Recién salidos de la parrilla</span>
                <h2 class="text-3xl md:text-5xl font-extrabold text-white mb-2 leading-tight">El Alambre<br>Perfecto</h2>
                <p class="text-gray-200 text-sm md:text-lg max-w-sm">Carne asada al momento con una costra de queso irresistible.</p>
            </div>
        </div>
    </section>

    <!-- Categorías (Scroll horizontal) -->
    <section class="max-w-7xl mx-auto px-4 py-2 sticky top-[72px] bg-[#F5F5F4]/90 backdrop-blur z-30">
        <div class="flex gap-3 overflow-x-auto hide-scroll py-2" id="category-filters">
            <button onclick="filtrar('Todos', this)" class="cat-btn bg-brand-dark text-white px-6 py-2.5 rounded-2xl font-bold whitespace-nowrap shadow-md transition-all">🔥 Todo el Menú</button>
            <button onclick="filtrar('Entradas', this)" class="cat-btn bg-white text-gray-600 hover:bg-gray-50 px-6 py-2.5 rounded-2xl font-bold whitespace-nowrap shadow-sm border border-gray-100 transition-all">🍟 Entradas</button>
            <button onclick="filtrar('Alambres', this)" class="cat-btn bg-white text-gray-600 hover:bg-gray-50 px-6 py-2.5 rounded-2xl font-bold whitespace-nowrap shadow-sm border border-gray-100 transition-all">🌮 Alambres</button>
            <button onclick="filtrar('Hamburguesas', this)" class="cat-btn bg-white text-gray-600 hover:bg-gray-50 px-6 py-2.5 rounded-2xl font-bold whitespace-nowrap shadow-sm border border-gray-100 transition-all">🍔 Hamburguesas</button>
            <button onclick="filtrar('Bebidas', this)" class="cat-btn bg-white text-gray-600 hover:bg-gray-50 px-6 py-2.5 rounded-2xl font-bold whitespace-nowrap shadow-sm border border-gray-100 transition-all">🥤 Bebidas</button>
            <button onclick="filtrar('Postres', this)" class="cat-btn bg-white text-gray-600 hover:bg-gray-50 px-6 py-2.5 rounded-2xl font-bold whitespace-nowrap shadow-sm border border-gray-100 transition-all">🍰 Postres</button>
        </div>
    </section>

    <!-- Menú de Productos (Grid Comercial) -->
    <main class="max-w-7xl mx-auto px-4 py-6">
        <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Los productos se inyectan por JS -->
        </div>
    </main>

    <!-- Carrito Flotante Mobile (Aparece cuando hay items) -->
    <div id="mobile-cart-btn" class="fixed bottom-6 left-4 right-4 z-40 hidden animate-slide-up md:hidden">
        <button onclick="toggleCart()" class="w-full bg-brand-dark text-white rounded-2xl p-4 shadow-2xl flex justify-between items-center group active:scale-95 transition-transform">
            <div class="flex items-center gap-3">
                <div class="bg-brand-orange text-white w-8 h-8 rounded-full flex items-center justify-center font-bold" id="mobile-cart-count">1</div>
                <span class="font-bold text-lg">Ver Orden</span>
            </div>
            <div class="flex items-center gap-3">
                <span class="font-bold text-xl text-brand-yellow" id="mobile-cart-total">$0.00</span>
                <i class="fa-solid fa-chevron-right text-gray-400 group-hover:translate-x-1 transition-transform"></i>
            </div>
        </button>
    </div>

    <!-- Modal Drawer Carrito (Diseño lateral en PC, Inferior en Mobile) -->
    <div id="cart-overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden opacity-0 transition-opacity duration-300" onclick="if(event.target === this) toggleCart()">
        <div id="cart-drawer" class="fixed bottom-0 md:top-0 md:right-0 w-full md:w-[450px] h-[85vh] md:h-full bg-white rounded-t-3xl md:rounded-none shadow-2xl transform translate-y-full md:translate-y-0 md:translate-x-full transition-transform duration-300 flex flex-col">
            
            <!-- Handle visual para móvil -->
            <div class="w-12 h-1.5 bg-gray-300 rounded-full mx-auto mt-4 mb-2 md:hidden"></div>
            
            <div class="px-6 py-4 flex justify-between items-center border-b border-gray-100">
                <h2 class="text-2xl font-extrabold flex items-center gap-2">
                    <i class="fa-solid fa-bag-shopping text-brand-orange"></i> Tu Orden
                </h2>
                <button onclick="toggleCart()" class="w-8 h-8 bg-gray-100 hover:bg-gray-200 rounded-full flex items-center justify-center text-gray-600 transition">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <!-- Items -->
            <div id="cart-items" class="flex-1 overflow-y-auto p-6 hide-scroll flex flex-col gap-4">
                <!-- Inyectado por JS -->
            </div>

            <!-- Checkout Section -->
            <div class="p-6 bg-white border-t border-gray-100 shadow-[0_-10px_20px_rgba(0,0,0,0.03)] rounded-t-3xl">
                <div class="flex justify-between items-center mb-2 text-gray-500 font-medium">
                    <span>Subtotal</span>
                    <span id="summary-subtotal">$0.00</span>
                </div>
                <div class="flex justify-between items-center mb-6 text-2xl font-extrabold text-brand-dark">
                    <span>Total a pagar</span>
                    <span id="summary-total" class="text-brand-orange">$0.00</span>
                </div>

                <!-- Facturación UI -->
                <div class="bg-gray-50 p-4 rounded-xl mb-6 border border-gray-200">
                    <label class="flex items-start gap-3 cursor-pointer">
                        <input type="checkbox" id="req-factura" class="mt-1 w-5 h-5 text-brand-orange rounded border-gray-300 focus:ring-brand-orange accent-brand-orange">
                        <div>
                            <span class="block font-bold text-sm text-gray-800">Requiero Factura Electrónica</span>
                            <span class="block text-xs text-gray-500 mt-0.5">Ingresarás tu RFC y e.firma en el siguiente paso.</span>
                        </div>
                    </label>
                </div>

                <button onclick="procesarPago()" id="btn-checkout" class="w-full bg-brand-yellow hover:bg-brand-orange text-brand-dark py-4 rounded-2xl font-extrabold text-lg flex justify-center items-center gap-2 shadow-glow transition-all active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
                    <i class="fa-brands fa-stripe text-2xl"></i> Ir a Pagar
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts de Lógica -->

            // --- POSTRES ---
            { 
                id: 'p1', nombre: 'Churros Rellenos', 
                desc: 'Orden de 3 churros crujientes espolvoreados con canela y azúcar, rellenos de cajeta o chocolate.', 
                precio: 55.00, cat: 'Postres',

            },
            { 
                id: 'p2', nombre: 'Flan Napolitano', 
                desc: 'Rebanada de flan casero cremoso con caramelo oscuro y un toque de vainilla.', 
                precio: 45.00, cat: 'Postres', 
                img: 'https://images.unsplash.com/photo-1590080874088-eec64895b423?q=80&w=800&auto=format&fit=crop'
            },
            { 
                id: 'p3', nombre: 'Cheesecake de Zarzamora', 
                desc: 'Rebanada de pastel de queso extra cremoso con jalea natural de zarzamora y base de galleta.', 
                precio: 65.00, cat: 'Postres', 
                img: 'https://images.unsplash.com/photo-1533134242443-d4fd215305ad?q=80&w=800&auto=format&fit=crop'
            },
            { 
                id: 'p4', nombre: 'Brownie Caliente con Helado', 
                desc: 'Exquisito brownie de chocolate caliente servido con una generosa bola de helado de vainilla artesanal.', 
                precio: 70.00, cat: 'Postres', 
                img: 'https://images.unsplash.com/photo-1564355808539-22fda35bed7e?q=80&w=800&auto=format&fit=crop'
            }
        ];

        let carrito = [];

        // 2. RENDERIZADO COMERCIAL (Tarjetas Grandes)
        const formatMXN = num => new Intl.NumberFormat('es-MX', {style:'currency', currency:'MXN'}).format(num);

        function renderMenu(filtro = 'Todos') {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            
            const filtrados = filtro === 'Todos' ? menuData : menuData.filter(p => p.cat === filtro);

            filtrados.forEach(prod => {
                grid.innerHTML += `
                    <div class="bg-white rounded-[24px] shadow-soft overflow-hidden flex flex-col group hover:shadow-xl transition-shadow duration-300">
                        <div class="relative h-48 md:h-56 overflow-hidden bg-gray-100">
                            <img src="${prod.img}" alt="${prod.nombre}" loading="lazy" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
                            <div class="absolute top-4 right-4 bg-white/95 backdrop-blur shadow-sm px-4 py-1.5 rounded-full font-extrabold text-brand-dark">
                                ${formatMXN(prod.precio)}
                            </div>
                        </div>
                        <div class="p-5 flex-1 flex flex-col">
                            <span class="text-[10px] font-bold uppercase tracking-wider text-brand-orange mb-1">${prod.cat}</span>
                            <h3 class="text-xl font-bold text-gray-800 mb-2 leading-tight">${prod.nombre}</h3>
                            <p class="text-gray-500 text-sm flex-1 leading-relaxed mb-4">${prod.desc}</p>
                            
                            <button onclick="agregarAlCarrito('${prod.id}')" class="w-full bg-brand-light hover:bg-brand-yellow text-brand-dark py-3.5 rounded-xl font-bold transition-colors border border-gray-200 hover:border-brand-yellow flex justify-center items-center gap-2 group-hover:bg-brand-yellow">
                                <i class="fa-solid fa-plus"></i> Agregar
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        function filtrar(categoria, btnElement) {
            // Estilos activos para botones
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.className = "cat-btn bg-white text-gray-600 hover:bg-gray-50 px-6 py-2.5 rounded-2xl font-bold whitespace-nowrap shadow-sm border border-gray-100 transition-all";
            });
            btnElement.className = "cat-btn bg-brand-dark text-white px-6 py-2.5 rounded-2xl font-bold whitespace-nowrap shadow-md transition-all";
            
            renderMenu(categoria);
        }

        // 3. LÓGICA DEL CARRITO
        function agregarAlCarrito(id) {
            const item = carrito.find(i => i.id === id);
            if (item) item.cantidad++;
            else carrito.push({ ...menuData.find(p => p.id === id), cantidad: 1 });
            
            actualizarCarritoUI();
            
            // Efecto visual rápido
            const btn = document.getElementById('mobile-cart-btn');
            btn.classList.add('scale-105');
            setTimeout(() => btn.classList.remove('scale-105'), 200);
        }

        function cambiarCantidad(id, delta) {
            const index = carrito.findIndex(i => i.id === id);
            if (index > -1) {
                carrito[index].cantidad += delta;
                if (carrito[index].cantidad <= 0) carrito.splice(index, 1);
                actualizarCarritoUI();
            }
        }

        function actualizarCarritoUI() {
            const totalItems = carrito.reduce((sum, i) => sum + i.cantidad, 0);
            const totalPagar = carrito.reduce((sum, i) => sum + (i.precio * i.cantidad), 0);
            
            // Badges Desktop
            const badgeDesk = document.getElementById('cart-badge-desktop');
            if(totalItems > 0) {
                badgeDesk.innerText = totalItems;
                badgeDesk.classList.remove('hidden');
            } else {
                badgeDesk.classList.add('hidden');
            }

            // Mobile Floating Button
            const mobileBtn = document.getElementById('mobile-cart-btn');
            if (totalItems > 0) {
                mobileBtn.classList.remove('hidden');
                document.getElementById('mobile-cart-count').innerText = totalItems;
                document.getElementById('mobile-cart-total').innerText = formatMXN(totalPagar);
            } else {
                mobileBtn.classList.add('hidden');
            }

            // Totales Drawer
            document.getElementById('summary-subtotal').innerText = formatMXN(totalPagar);
            document.getElementById('summary-total').innerText = formatMXN(totalPagar);

            // Lista del Drawer
            const lista = document.getElementById('cart-items');
            if (carrito.length === 0) {
                lista.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full text-gray-400">
                        <i class="fa-solid fa-basket-shopping text-6xl mb-4 text-gray-200"></i>
                        <p class="font-medium text-lg text-gray-500">Aún no hay comida aquí</p>
                        <button onclick="toggleCart()" class="mt-4 text-brand-orange font-bold">Ver menú</button>
                    </div>`;
                document.getElementById('btn-checkout').disabled = true;
                return;
            }

            document.getElementById('btn-checkout').disabled = false;
            lista.innerHTML = carrito.map(item => `
                <div class="flex gap-4 items-center bg-white border border-gray-100 p-3 rounded-2xl shadow-sm">
                    <img src="${item.img}" class="w-16 h-16 rounded-xl object-cover">
                    <div class="flex-1">
                        <h4 class="font-bold text-gray-800 leading-tight">${item.nombre}</h4>
                        <div class="text-brand-orange font-bold text-sm mt-1">${formatMXN(item.precio)}</div>
                    </div>
                    <div class="flex items-center gap-2 bg-gray-50 rounded-lg p-1 border border-gray-200">
                        <button onclick="cambiarCantidad('${item.id}', -1)" class="w-7 h-7 flex items-center justify-center text-gray-500 hover:text-brand-red"><i class="fa-solid fa-minus text-xs"></i></button>
                        <span class="w-5 text-center font-bold text-sm">${item.cantidad}</span>
                        <button onclick="cambiarCantidad('${item.id}', 1)" class="w-7 h-7 flex items-center justify-center text-gray-500 hover:text-brand-orange"><i class="fa-solid fa-plus text-xs"></i></button>
                    </div>
                </div>
            `).join('');
        }

        // 4. MANEJO DE MODALES Y PAGOS
        function toggleCart() {
            const overlay = document.getElementById('cart-overlay');
            const drawer = document.getElementById('cart-drawer');
            
            if (overlay.classList.contains('hidden')) {
                overlay.classList.remove('hidden');
                document.body.style.overflow = 'hidden'; // Prevenir scroll
                setTimeout(() => {
                    overlay.classList.remove('opacity-0');
                    if(window.innerWidth < 768) {
                        drawer.classList.remove('translate-y-full'); // Subir en movil
                    } else {
                        drawer.classList.remove('translate-x-full'); // Lado en PC
                    }
                }, 10);
            } else {
                overlay.classList.add('opacity-0');
                if(window.innerWidth < 768) {
                    drawer.classList.add('translate-y-full');
                } else {
                    drawer.classList.add('translate-x-full');
                }
                setTimeout(() => {
                    overlay.classList.add('hidden');
                    document.body.style.overflow = '';
                }, 300);
            }
        }

        async function procesarPago() {
            const btn = document.getElementById('btn-checkout');
            const requiereFactura = document.getElementById('req-factura').checked;
            
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Conectando...';
            btn.disabled = true;

            // Simulación de conexión a Vercel/Stripe
            setTimeout(() => {
                alert(`¡Redirigiendo a Stripe Checkout!\n\nDatos listos para enviar a tu API en Vercel:\n- Total: ${document.getElementById('summary-total').innerText}\n- Factura requerida: ${requiereFactura ? 'SÍ (Pedir RFC/e.firma después)' : 'NO'}`);
                
                // Reset simulado
                btn.innerHTML = '<i class="fa-brands fa-stripe text-2xl"></i> Ir a Pagar';
                btn.disabled = false;
                carrito = [];
                actualizarCarritoUI();
                toggleCart();
            }, 1500);
        }

        // Inicializar
        window.onload = () => {
            renderMenu();
            actualizarCarritoUI();
        };
    </script>
</body>
</html>
